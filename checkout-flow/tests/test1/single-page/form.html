<!DOCTYPE html>
<html>
<head><title>Single Page Checkout</title></head>
<body style="max-width: 600px; margin: 40px auto; font-family: system-ui;">
  <h2>Checkout</h2>
  <form>
    <fieldset style="border: 1px solid #e2e8f0; padding: 20px; margin-bottom: 16px; border-radius: 8px;">
      <legend>Shipping</legend>
      <input placeholder="Full Name" style="width: 100%; padding: 8px; margin-bottom: 8px; border: 1px solid #ccc; border-radius: 4px;">
      <input placeholder="Address" style="width: 100%; padding: 8px; margin-bottom: 8px; border: 1px solid #ccc; border-radius: 4px;">
    </fieldset>
    <fieldset style="border: 1px solid #e2e8f0; padding: 20px; margin-bottom: 16px; border-radius: 8px;">
      <legend>Payment</legend>
      <input placeholder="Card Number" style="width: 100%; padding: 8px; margin-bottom: 8px; border: 1px solid #ccc; border-radius: 4px;">
      <input placeholder="Expiry" style="width: 48%; padding: 8px; border: 1px solid #ccc; border-radius: 4px;">
      <input placeholder="CVV" style="width: 48%; padding: 8px; margin-left: 4%; border: 1px solid #ccc; border-radius: 4px;">
    </fieldset>
    <button style="width: 100%; padding: 14px; background: #3b82f6; color: white; border: none; border-radius: 6px; font-size: 1rem;">Place Order</button>
  </form>
</body>
</html>
